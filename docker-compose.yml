services:
  kafka: # Configuración de un servicio de Kafka usando la imagen oficial de Apache Kafka, con parámetros para 
  # habilitar el modo KRaft y permitir la creación automática de topics, facilitando el desarrollo y 
  # las pruebas locales sin necesidad de configurar un clúster completo
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
# Configuración de Kafka para un entorno de desarrollo, con un solo nodo que actúa como broker y controller, 
# y con parámetros ajustados para permitir la creación automática de topics y una replicación mínima adecuada para pruebas locales
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  metrics: # Configuración del servicio de métricas, que se construye a partir del Dockerfile en el directorio actual, con parámetros de entorno para especificar la ruta del archivo de métricas y la conexión a Kafka, y con una dependencia para asegurar que Kafka esté disponible antes de iniciar el servicio de métricas.
    build: .
    command: uvicorn app.metrics:app --host 0.0.0.0 --port 8000
    ports:
      - "8100:8000"
    volumes:
      - ./results:/app/results
    environment:
      - METRICS_PATH=/app/results/events.csv
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka

  responder: # Configuración del servicio responder, que se construye a partir del Dockerfile en el directorio actual,
    build: .
    command: uvicorn app.responder:app --host 0.0.0.0 --port 8000
    ports:
      - "8101:8000"
    volumes:
      - ./967_buildings.csv:/app/967_buildings.csv:ro
    environment:
      - BUILDINGS_CSV_PATH=/app/967_buildings.csv
      - BUILDINGS_CSV_MAX_ROWS=50000
      - FAILURE_RATE=0.0
      - ARTIFICIAL_LATENCY_MS=120
      - OUTAGE=false


  producer: # Configuración de Producer que se construye a partir del Dockerfile en el directorio actual, con parámetros de entorno para conectarse a Kafka y al servicio de métricas.
    build: .
    command: uvicorn app.producer:app --host 0.0.0.0 --port 8000
    ports:
      - "8102:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - METRICS_URL=http://metrics:8000
      - DEFAULT_TTL_SECONDS=300
    depends_on:
      - kafka
      - metrics

  sync_api: # Configuración de Sync API que se construye a partir del Dockerfile en el directorio actual, con parámetros de entorno para conectarse a Redis, al servicio responder y al servicio de métricas.
    build: .
    command: uvicorn app.sync_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8103:8000"
    environment:
      - REDIS_HOST=redis
      - RESPONDER_URL=http://responder:8000
      - METRICS_URL=http://metrics:8000
      - DEFAULT_TTL_SECONDS=300
    depends_on:
      - redis
      - responder
      - metrics

  worker: # Configuración de Worker que se construye a partir del Dockerfile en el directorio actual, con parámetros de entorno para conectarse a Kafka, Redis, al servicio responder y al servicio de métricas, y con dependencias para asegurar que estos servicios estén disponibles antes de iniciar el worker.
    build: .
    command: python -m app.worker
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - RESPONDER_URL=http://responder:8000
      - METRICS_URL=http://metrics:8000
      - CONSUMER_GROUP=geo-workers
      - MAX_RETRIES=3
      - RETRY_DELAY_SECONDS=2
      - DEFAULT_TTL_SECONDS=300
    depends_on:
      - kafka
      - redis
      - responder
      - metrics

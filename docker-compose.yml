services:
  kafka: # Configuración de un servicio de Kafka usando la imagen oficial de Apache Kafka, con parámetros para 
  # habilitar el modo KRaft y permitir la creación automática de topics, facilitando el desarrollo y 
  # las pruebas locales sin necesidad de configurar un clúster completo
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=6
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
# Configuración de Kafka para un entorno de desarrollo, con un solo nodo que actúa como broker y controller, 
# y con parámetros ajustados para permitir la creación automática de topics y una replicación mínima adecuada para pruebas locales
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  responder: # Configuración del servicio responder, que se construye a partir del Dockerfile en el directorio actual,
    build: .
    command: uvicorn app.responder:app --host 0.0.0.0 --port 8000
    ports:
      - "8101:8000"
    volumes:
      - ./967_buildings.csv:/app/967_buildings.csv:ro
    environment:
      - BUILDINGS_CSV_PATH=/app/967_buildings.csv
      - BUILDINGS_CSV_MAX_ROWS=50000
      - FAILURE_RATE=0.0
      - ARTIFICIAL_LATENCY_MS=120
      - OUTAGE=false
